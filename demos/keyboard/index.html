<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Keyboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="output"><span id="out-caret"></span></div>

<div id="keyboard">
    <div id="row1" class="row">
        <div class="key">Q</div>
        <div class="key" data-k="w">W</div>
        <div class="key">E</div>
        <div class="key">R</div>
        <div class="key">T</div>
        <div class="key">Y</div>
        <div class="key">U</div>
        <div class="key" data-k="i">I</div>
        <div class="key" data-k="o">O</div>
        <div class="key">P</div>
        <div class="key delete-key" data-k="delete">⌫</div>
    </div>
    <div id="row2" class="row">
        <div class="key" data-k="a">A</div>
        <div class="key">S</div>
        <div class="key">D</div>
        <div class="key">F</div>
        <div class="key">G</div>
        <div class="key" data-k="h">H</div>
        <div class="key">J</div>
        <div class="key">K</div>
        <div class="key">L</div>
    </div>
    <div id="row3" class="row">
        <div class="key caps-key" data-k="caps">⇪</div>
        <div class="key">Z</div>
        <div class="key">X</div>
        <div class="key">C</div>
        <div class="key">V</div>
        <div class="key">B</div>
        <div class="key">N</div>
        <div class="key" data-k="m">M</div>
        <div class="key" data-k="?">?</div>
    </div>
    <div id="row-bottom" class="row">
        <div class="key special">123</div>
        <div class="key space" data-k="space">space</div>
        <div class="key send"  data-k="send">send</div>
    </div>
</div>

<script src="script.js" defer></script>
</body>
</html>
